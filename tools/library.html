<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
  <title>Sidekick Library</title>
 
  <!-- Metadata -->
  <meta name="Description" content="AEM Sidekick Library" />
  <meta name="robots" content="noindex" />
  <base href="/" />
 
  <!-- Basic Styling -->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #ededed;
      height: 100%;
    }
 
    /* Hide helix sidekick inside library view */
    helix-sidekick {
      display: none;
    }
  </style>
</head>
 
<body>
 
  <!-- Load Sidekick Library Module -->
  <script
    type="module"
    src="https://www.aem.live/tools/sidekick/library/index.js">
  </script>
 
  <!-- Initialize Library -->
  <script>
    const library = document.createElement('sidekick-library');
 
    library.config = {
      base: '/tools/sidekick/library.json'
    };
 
    document.body.prepend(library);
  </script>
 
</body>
</html>
