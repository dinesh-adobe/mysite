<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #ffffff;
    }

    h2 {
      margin-top: 0;
      color: #222;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      background-color: #1473e6;
      color: #fff;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #0d66d0;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

  <h2>Contact Us</h2>

  <form id="contactForm">

    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" name="name" required />
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input id="phone" name="phone" />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4"></textarea>
    </div>

    <button type="submit">Submit</button>

    <div id="status" class="status"></div>

  </form>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      console.log("Contact form loaded");

      const form = document.getElementById("contactForm");
      const statusDiv = document.getElementById("status");

      if (!form) {
        console.error("Form not found");
        return;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusDiv.textContent = "Submitting...";
        statusDiv.className = "status";

        const urlParams = new URLSearchParams(window.location.search);

        const referrer = urlParams.get("referrer") || "";
        const project = urlParams.get("project") || "";
        const repo = urlParams.get("repo") || "";

        const formData = new FormData();
        formData.append("gdocument", referrer);
        formData.append("project", project);
        formData.append("git_repo", repo);
        formData.append("name", document.getElementById("name").value);
        formData.append("phone", document.getElementById("phone").value);
        formData.append("email", document.getElementById("email").value);
        formData.append("message", document.getElementById("message").value);

        try {
          const response = await fetch(
            "https://webhook.site/9ebcbfbe-f87d-4292-952a-0da97c7b47c7",
            {
              method: "POST",
              body: formData
            }
          );

          if (!response.ok) {
            throw new Error("Server error: " + response.status);
          }

          statusDiv.textContent = "Form submitted successfully!";
          statusDiv.classList.add("success");
          form.reset();

        } catch (error) {
          console.error("Submission failed:", error);
          statusDiv.textContent = "Submission failed. Check console.";
          statusDiv.classList.add("error");
        }
      });
    });
  </script>

</body>
</html>
